spring:
  application:
    name: gestion-formation

  datasource:
    # L'URL pointe vers ta base "gestion_formation" que j'ai vue dans ton terminal
    url: jdbc:postgresql://localhost:5432/gestion_formation
    username: postgres
    password: system
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'update' va créer les tables automatiquement à partir de ton code Java
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true




# Pour éviter des problèmes de ports si tu as d'autres services
server:
  port: 8080