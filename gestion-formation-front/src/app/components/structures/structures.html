<app-navbar></app-navbar>
<div class="main-layout">
  <app-sidebar></app-sidebar>
  <main class="main-content">
    <div class="page-container">
      <div class="page-header">
        <div><h1>Gestion des Structures</h1><p>Liste de toutes les structures</p></div>
        <button class="btn-primary" (click)="openAddModal()" [disabled]="isLoading"><i class="fas fa-plus"></i> Nouvelle Structure</button>
      </div>
      <div class="loading-container" *ngIf="isLoading"><div class="spinner"></div><p>Chargement des structures...</p></div>
      <ng-container *ngIf="!isLoading">
        <div class="search-box"><i class="fas fa-search search-icon"></i><input type="text" [(ngModel)]="searchTerm" placeholder="Rechercher une structure..." class="search-input" /></div>
        <div class="table-container">
          <table class="data-table"><thead><tr><th>ID</th><th>Libellé</th><th>Actions</th></tr></thead>
            <tbody>
              <tr *ngFor="let structure of filteredStructures"><td>{{ structure.id }}</td><td class="name-cell">{{ structure.libelle }}</td>
                <td><div class="action-buttons"><button class="btn-edit" (click)="openEditModal(structure)"><i class="fas fa-edit"></i></button><button class="btn-delete" (click)="deleteStructure(structure.id!)"><i class="fas fa-trash-alt"></i></button></div></td></tr>
              <tr *ngIf="filteredStructures.length === 0"><td colspan="3" class="no-data"><i class="fas fa-building"></i><p>Aucune structure trouvée</p></td></tr>
            </tbody>
          </table>
        </div>
      </ng-container>
    </div>
  </main>
</div>
<div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header"><h2>{{ isEditMode ? 'Modifier' : 'Ajouter' }} une structure</h2><button class="btn-close" (click)="closeModal()"><i class="fas fa-times"></i></button></div>
    <form (ngSubmit)="onSubmit()" class="modal-form">
      <div class="form-group"><label>Libellé *</label><input type="text" [(ngModel)]="currentStructure.libelle" name="libelle" required class="form-control" placeholder="Ex: Direction Centrale" /></div>
      <div class="modal-actions"><button type="button" class="btn-secondary" (click)="closeModal()">Annuler</button><button type="submit" class="btn-primary">{{ isEditMode ? 'Modifier' : 'Ajouter' }}</button></div>
    </form>
  </div>
</div>
