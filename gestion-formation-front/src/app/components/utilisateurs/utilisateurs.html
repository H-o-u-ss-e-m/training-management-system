<app-navbar></app-navbar>
<div class="main-layout">
  <app-sidebar></app-sidebar>
  <main class="main-content">
    <div class="page-container">
      <div class="page-header">
        <div><h1>Gestion des Utilisateurs</h1><p>Liste de tous les utilisateurs de l'application</p></div>
        <button class="btn-primary" (click)="openAddModal()" [disabled]="isLoading"><i class="fas fa-plus"></i> Nouvel Utilisateur</button>
      </div>
      <div class="loading-container" *ngIf="isLoading"><div class="spinner"></div><p>Chargement des utilisateurs...</p></div>
      <ng-container *ngIf="!isLoading">
        <div class="search-box"><i class="fas fa-search search-icon"></i><input type="text" [(ngModel)]="searchTerm" placeholder="Rechercher un utilisateur..." class="search-input" /></div>
        <div class="table-container">
          <table class="data-table">
            <thead><tr><th>ID</th><th>Login</th><th>Rôle</th><th>Actions</th></tr></thead>
            <tbody>
              <tr *ngFor="let utilisateur of filteredUtilisateurs">
                <td>{{ utilisateur.id }}</td><td class="name-cell">{{ utilisateur.login }}</td>
                <td><span class="badge" [class]="'badge-' + (utilisateur.roleNom || 'simple').toLowerCase()">{{ utilisateur.roleNom }}</span></td>
                <td><div class="action-buttons"><button class="btn-edit" (click)="openEditModal(utilisateur)"><i class="fas fa-edit"></i></button><button class="btn-delete" (click)="deleteUtilisateur(utilisateur.id!)"><i class="fas fa-trash-alt"></i></button></div></td>
              </tr>
              <tr *ngIf="filteredUtilisateurs.length === 0"><td colspan="4" class="no-data"><i class="fas fa-users"></i><p>Aucun utilisateur trouvé</p></td></tr>
            </tbody>
          </table>
        </div>
      </ng-container>
    </div>
  </main>
</div>
<div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header"><h2>{{ isEditMode ? 'Modifier' : 'Ajouter' }} un utilisateur</h2><button class="btn-close" (click)="closeModal()"><i class="fas fa-times"></i></button></div>
    <form (ngSubmit)="onSubmit()" class="modal-form">
      <div class="form-group"><label>Login *</label><input type="text" [(ngModel)]="currentUtilisateur.login" name="login" required class="form-control" placeholder="Nom d'utilisateur" /></div>
      <div class="form-group" *ngIf="!isEditMode"><label>Mot de passe *</label><input type="password" [(ngModel)]="currentUtilisateur.password" name="password" required class="form-control" placeholder="Mot de passe" /></div>
      <div class="form-group"><label>Rôle *</label>
        <select [(ngModel)]="currentUtilisateur.roleId" name="roleId" required class="form-control">
          <option [value]="0">Sélectionner un rôle</option>
          <option [value]="1">SIMPLE_UTILISATEUR</option>
          <option [value]="2">RESPONSABLE</option>
          <option [value]="3">ADMINISTRATEUR</option>
        </select>
      </div>
      <div class="modal-actions"><button type="button" class="btn-secondary" (click)="closeModal()">Annuler</button><button type="submit" class="btn-primary">{{ isEditMode ? 'Modifier' : 'Ajouter' }}</button></div>
    </form>
  </div>
</div>
